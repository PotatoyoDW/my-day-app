name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'api.gs'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        run: |
          python3 -c "
          import json, os
          creds = {
            'token': {
              'access_token': '',
              'refresh_token': os.environ['CLASP_REFRESH_TOKEN'],
              'token_type': 'Bearer',
              'expiry_date': 0
            },
            'oauth2ClientSettings': {
              'clientId': '1072944905499-vm2v2i5dvn0a0d2o4ca36i1vge8cvbn0.apps.googleusercontent.com',
              'clientSecret': 'v6V3fKV_zWU7iw1DrpO1rknX',
              'redirectUri': 'http://localhost'
            },
            'isLocalCreds': False
          }
          with open(os.path.expanduser('~/.clasprc.json'), 'w') as f:
              json.dump(creds, f)
          print('credentials written')
          "
        env:
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}

      - name: Setup clasp project config
        run: |
          echo '{"scriptId":"1sTR3uqMxXckmOMxtKaqL66wBH8gWReU-1IXgLf5tbQStBPvt2uiFn5-l","rootDir":".","fileExtension":"gs","filePushOrder":["api.gs"]}' > .clasp.json

      - name: Push to GAS
        run: clasp push --force
